<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical History - MedAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="/patient_dashboard.html">MedAI Patient</a>
            <button class="btn btn-outline-danger" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Medical History</h2>
        <div id="historyList" class="list-group">
            <!-- Loaded dynamically -->
        </div>
    </div>

    <script>
        const token = localStorage.getItem('access_token');
        if (!token) window.location.href = '/login';

        async function loadHistory() {
            const res = await fetch('/patient/history', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const reports = await res.json();
            const container = document.getElementById('historyList');
            if (reports.length === 0) {
                container.innerHTML = '<p class="text-muted">No reports found.</p>';
                return;
            }
            container.innerHTML = reports.map(r => `
                <div class="list-group-item">
                    <div class="d-flex justify-content-between">
                        <h5>${r.date}</h5>
                        <span class="badge bg-${r.severity === 'Critical' ? 'danger' : (r.severity === 'Moderate' ? 'warning' : 'success')}">${r.severity}</span>
                    </div>
                    <p><strong>Symptoms:</strong> ${r.symptoms}</p>
                    <p><strong>Doctor Response:</strong> ${r.doctor_response || 'Pending'}</p>
                    <a href="/patient/download_report/${r.report_id}" class="btn btn-sm btn-secondary">Download PDF</a>
                </div>
            `).join('');
        }

        loadHistory();

        function logout() {
            localStorage.clear();
            window.location.href = '/login';
        }
    </script>
</body>
</html>
