<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Doctors - MedAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6; --primary-dark: #1d4ed8; --primary-light: #eff6ff;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --sidebar-bg: #0f172a; --sidebar-text: #94a3b8;
            --bg: #f1f5f9; --card-bg: #ffffff; --text: #1e293b; --muted: #64748b; --border: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        .sidebar { width: 260px; min-width: 260px; background: var(--sidebar-bg); display: flex; flex-direction: column; overflow-y: auto; }
        .sidebar-brand { padding: 24px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.07); display: flex; align-items: center; gap: 10px; }
        .sidebar-brand .logo-icon { width: 36px; height: 36px; background: var(--primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; }
        .sidebar-brand span { color: #fff; font-weight: 700; font-size: 1.1rem; }
        .sidebar-nav { flex: 1; padding: 16px 12px; }
        .nav-item-btn { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-radius: 10px; color: var(--sidebar-text); font-size: 0.875rem; font-weight: 500; cursor: pointer; border: none; background: none; width: 100%; text-align: left; transition: all 0.2s; margin-bottom: 4px; text-decoration: none; }
        .nav-item-btn:hover { background: rgba(255,255,255,0.06); color: #fff; }
        .nav-item-btn.active { background: rgba(59,130,246,0.15); color: var(--primary); }
        .nav-item-btn i { width: 18px; text-align: center; }
        .sidebar-footer { padding: 16px 12px; border-top: 1px solid rgba(255,255,255,0.07); }

        .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { padding: 14px 24px; background: var(--card-bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .topbar h1 { font-size: 1.1rem; font-weight: 700; }
        .content-area { flex: 1; overflow-y: auto; padding: 24px; }

        .card-box { background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border); padding: 24px; margin-bottom: 20px; }
        .section-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
        .section-title i { color: var(--primary); }

        /* Doctor Cards */
        .doctor-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
        .doctor-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; padding: 20px; transition: all 0.3s; cursor: pointer; position: relative; }
        .doctor-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); border-color: var(--primary); }
        .doctor-card.selected { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
        .doctor-card .doc-header { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
        .doctor-card .doc-avatar { width: 52px; height: 52px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1.2rem; font-weight: 700; }
        .doctor-card .doc-name { font-weight: 700; font-size: 1rem; }
        .doctor-card .doc-spec { font-size: 0.8rem; color: var(--primary); font-weight: 600; }
        .doctor-card .doc-details { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .doctor-card .detail-badge { font-size: 0.75rem; padding: 4px 10px; background: var(--primary-light); color: var(--primary-dark); border-radius: 20px; font-weight: 500; }
        .stars { color: #f59e0b; font-size: 0.85rem; }
        .stars .empty { color: #d1d5db; }
        .rating-text { font-size: 0.75rem; color: var(--muted); margin-left: 6px; }

        .btn-book { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #fff; border: none; padding: 14px 32px; border-radius: 12px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 14px rgba(59,130,246,0.3); }
        .btn-book:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(59,130,246,0.45); }
        .btn-book:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-brand">
            <div class="logo-icon"><i class="fas fa-heartbeat"></i></div>
            <div><span>MedAI</span><small style="color:var(--sidebar-text);font-size:0.7rem;">Patient Portal</small></div>
        </div>
        <div class="sidebar-nav">
            <a href="/patient_dashboard.html" class="nav-item-btn"><i class="fas fa-comments"></i> AI Consultation</a>
            <a href="/patient_dashboard.html#history" class="nav-item-btn"><i class="fas fa-history"></i> Medical History</a>
            <a href="/appointment.html" class="nav-item-btn"><i class="fas fa-calendar-alt"></i> Appointments</a>
            <a href="/find_doctors.html" class="nav-item-btn active"><i class="fas fa-user-md"></i> Find Doctors</a>
        </div>
        <div class="sidebar-footer">
            <button class="nav-item-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>

    <div class="main-area">
        <div class="topbar">
            <h1><i class="fas fa-user-md me-2 text-primary"></i>Find Doctors</h1>
        </div>
        <div class="content-area">
            <div class="card-box" id="doctors">
                <div class="section-title"><i class="fas fa-user-md"></i> Book New Appointment</div>
                <p style="color:var(--muted);margin-bottom:16px;font-size:0.88rem;">Select a doctor, pick a date and time, then submit your appointment request.</p>
                <div class="doctor-grid" id="doctorGrid"></div>
                <div class="mt-4 d-flex align-items-end gap-3 flex-wrap">
                    <div>
                        <label style="font-weight:600;font-size:0.85rem;color:var(--muted);display:block;margin-bottom:6px;">Date & Time</label>
                        <input type="datetime-local" class="form-control" id="appointmentDate" style="border-radius:10px;border:1px solid var(--border);padding:10px 14px;">
                    </div>
                    <button class="btn-book" id="bookBtn" onclick="bookAppointment()" disabled>
                        <i class="fas fa-calendar-plus me-2"></i>Request Appointment
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const token = localStorage.getItem('access_token');
        if (!token) window.location.href = '/login';
        let selectedDoctorId = null;

        async function loadDoctors() {
            const res = await fetch('/patient/doctors', { headers: { 'Authorization': `Bearer ${token}` } });
            const doctorsData = await res.json();
            const grid = document.getElementById('doctorGrid');
            if (doctorsData.length === 0) {
                grid.innerHTML = '<p class="text-muted">No doctors are currently available.</p>';
                return;
            }
            grid.innerHTML = doctorsData.map(d => `
                <div class="doctor-card" id="doc-${d.doctor_id}" onclick="selectDoctor(${d.doctor_id})">
                    <div class="doc-header">
                        <div class="doc-avatar">${d.name.charAt(0)}</div>
                        <div>
                            <div class="doc-name">Dr. ${d.name}</div>
                            <div class="doc-spec">${d.specialization}</div>
                        </div>
                    </div>
                    <div class="doc-details">
                        ${d.education ? `<span class="detail-badge"><i class="fas fa-graduation-cap me-1"></i>${d.education}</span>` : ''}
                        ${d.experience_years ? `<span class="detail-badge"><i class="fas fa-briefcase-medical me-1"></i>${d.experience_years} yrs exp</span>` : ''}
                    </div>
                    <div class="d-flex align-items-center">
                        <div class="stars">${renderStars(d.average_rating)}</div>
                        <span class="rating-text">${d.average_rating > 0 ? d.average_rating.toFixed(1) : 'New'} (${d.total_reviews} reviews)</span>
                    </div>
                </div>
            `).join('');
        }

        function renderStars(rating) {
            let html = '';
            for (let i = 1; i <= 5; i++) {
                if (i <= Math.floor(rating)) html += '<i class="fas fa-star"></i>';
                else if (i - rating < 1 && i - rating > 0) html += '<i class="fas fa-star-half-alt"></i>';
                else html += '<i class="far fa-star empty"></i>';
            }
            return html;
        }

        function selectDoctor(id) {
            document.querySelectorAll('.doctor-card').forEach(c => c.classList.remove('selected'));
            document.getElementById(`doc-${id}`).classList.add('selected');
            selectedDoctorId = id;
            document.getElementById('bookBtn').disabled = false;
        }

        async function bookAppointment() {
            const dt = document.getElementById('appointmentDate').value;
            if (!selectedDoctorId || !dt) { alert('Please select a doctor and date/time.'); return; }
            const btn = document.getElementById('bookBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Booking...';
            const res = await fetch('/patient/appointments', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ doctor_id: selectedDoctorId, appointment_date: dt })
            });
            if (res.ok) {
                alert('Appointment requested successfully!');
                window.location.href = '/appointment.html';
            } else {
                const r = await res.json();
                alert(r.msg || 'Failed to book appointment.');
                btn.innerHTML = '<i class="fas fa-calendar-plus me-2"></i>Request Appointment';
                btn.disabled = false;
            }
        }

        loadDoctors();

        function logout() { localStorage.clear(); window.location.href = '/login'; }
    </script>
</body>
</html>
