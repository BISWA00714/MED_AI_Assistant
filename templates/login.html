<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedAI - Dynamic Login Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            /* Default Base Values */
            font-family: 'Inter', sans-serif;
        }

        /* 1. Patient Theme (Soothing Blues) */
        body.theme-patient {
            --bg-grad-1: #e0f2fe;
            --bg-grad-2: #bae6fd;
            --primary: #0284c7;
            --primary-hover: #0369a1;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-glow: rgba(2, 132, 199, 0.2);
            --role-bg: rgba(0, 0, 0, 0.05);
            --input-border: rgba(0, 0, 0, 0.15);
        }

        /* 2. Doctor Theme (Clinical Greens/Teals) */
        body.theme-doctor {
            --bg-grad-1: #f0fdf4;
            --bg-grad-2: #bbf7d0;
            --primary: #059669;
            --primary-hover: #047857;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #064e3b;
            --text-muted: #4b5563;
            --border-glow: rgba(5, 150, 105, 0.2);
            --role-bg: rgba(0, 0, 0, 0.05);
            --input-border: rgba(0, 0, 0, 0.15);
        }

        /* 3. Admin Theme (Dark Slate/Purple) */
        body.theme-admin {
            --bg-grad-1: #0f172a;
            --bg-grad-2: #1e293b;
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --card-bg: rgba(30, 41, 59, 0.85);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-glow: rgba(139, 92, 246, 0.4);
            --role-bg: rgba(255, 255, 255, 0.08);
            --input-border: rgba(255, 255, 255, 0.2);
        }

        body {
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
            background-size: 200% 200%;
            animation: gradientShift 15s ease infinite;
            color: var(--text-main);
            transition: background 0.8s ease-in-out, color 0.5s ease-in-out;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            margin: 0;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .navbar {
            padding: 1rem 0;
            transition: all 0.5s ease;
        }

        .navbar-brand {
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--text-main) !important;
            transition: color 0.5s ease;
        }

        .btn-outline-custom {
            color: var(--primary);
            border: 2px solid var(--primary);
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.3s;
        }
        .btn-outline-custom:hover {
            background: var(--primary);
            color: #fff;
        }

        .hero-section {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            padding: 3rem 1rem;
            transition: all 0.5s ease;
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -1px;
            color: var(--text-main);
        }
        
        .hero-subtitle {
            font-size: 1.25rem;
            font-weight: 400;
            color: var(--text-muted);
            max-width: 500px;
        }

        /* Form Card */
        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1), 0 0 30px var(--border-glow);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateY(0);
            width: 100%;
        }

        /* Role Tabs */
        .role-selector {
            display: none; /* hidden per user request to keep portals separate */
            background: var(--role-bg);
            border-radius: 16px;
            padding: 6px;
            margin-bottom: 30px;
            transition: background 0.5s ease;
        }
        
        .role-btn {
            flex: 1;
            padding: 12px 0;
            text-align: center;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-muted);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 1;
        }
        
        .role-btn.active {
            color: #fff !important;
        }

        .role-btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--primary);
            border-radius: 12px;
            z-index: -1;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px var(--border-glow);
        }

        .role-btn.active::before {
            opacity: 1;
            transform: scale(1);
        }

        .form-control {
            background: transparent !important;
            color: var(--text-main) !important;
            border: 2px solid var(--input-border);
            border-radius: 12px;
            padding: 14px 18px;
            transition: all 0.3s;
        }
        .form-control::placeholder {
            color: var(--text-muted);
            opacity: 0.7;
        }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 0.25rem var(--border-glow);
        }

        .form-label {
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 8px;
        }

        .btn-brand {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 1rem;
        }
        .btn-brand:hover {
            background: var(--primary-hover);
            transform: translateY(-3px);
            color: #fff;
            box-shadow: 0 10px 25px var(--border-glow);
        }

        .welcome-icon {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 1rem;
            transition: color 0.5s ease;
        }

        @media (max-width: 768px) {
            .hero-title { font-size: 2.5rem; }
            .login-card { padding: 2rem; }
        }
    </style>
</head>
<body class="theme-patient">

    <nav class="navbar navbar-expand-lg">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <i class="fas fa-heartbeat me-2" style="color: var(--primary);"></i>MedAI
            </a>
            <div>
                <a id="registerLink" class="btn btn-outline-custom px-4 py-2" href="/register/patient">Create Account</a>
            </div>
        </div>
    </nav>

    <div class="container flex-grow-1 d-flex">
        <div class="row w-100 align-items-center justify-content-center">
            
            <!-- Left Side Hero -->
            <div class="col-lg-5 col-md-12 pe-lg-5 mb-5 mb-lg-0 hero-section">
                <i id="heroIcon" class="fas fa-stethoscope welcome-icon"></i>
                <h1 id="heroTitle" class="hero-title">Patient Portal</h1>
                <p id="heroSubtitle" class="hero-subtitle">Access your personalized AI medical assistant, track your consultation history, and book appointments smoothly.</p>
            </div>

            <!-- Right Side Login Card -->
            <div class="col-lg-5 col-md-10">
                <div class="login-card">
                    
                    <div class="role-selector">
                        <div class="role-btn active" data-role="patient" onclick="setRole('patient')">Patient</div>
                        <div class="role-btn" data-role="doctor" onclick="setRole('doctor')">Doctor</div>
                        <div class="role-btn" data-role="admin" onclick="setRole('admin')">Admin</div>
                    </div>

                    <form id="loginForm">
                        <input type="hidden" id="role" value="patient">
                        
                        <div class="mb-4">
                            <label class="form-label">Email or Phone</label>
                            <input type="text" class="form-control" id="identifier" placeholder="Enter your credentials" required>
                        </div>
                        <div class="mb-5">
                            <label class="form-label d-flex justify-content-between">
                                Password
                            </label>
                            <div class="input-group">
                                <input type="password" class="form-control" style="border-right-color: transparent; border-top-right-radius: 0; border-bottom-right-radius: 0;" id="password" placeholder="••••••••" required>
                                <span class="input-group-text" style="background: transparent; border: 2px solid var(--input-border); border-left: none; border-top-right-radius: 12px; border-bottom-right-radius: 12px; cursor: pointer; color: var(--text-muted);" onclick="togglePassword()">
                                    <i class="fas fa-eye" id="togglePasswordIcon"></i>
                                </span>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-brand w-100">
                            Sign In to Dashboard <i class="fas fa-arrow-right"></i>
                        </button>
                    </form>

                </div>
            </div>
            
        </div>
    </div>

    <script>
        const THEMES = {
            patient: {
                themeClass: 'theme-patient',
                title: 'Patient Portal',
                subtitle: 'Access your personalized AI medical assistant, track your consultation history, and book appointments smoothly.',
                icon: 'fa-stethoscope',
                registerUrl: '/register/patient',
                registerText: 'Create Account'
            },
            doctor: {
                themeClass: 'theme-doctor',
                title: 'Doctor Portal',
                subtitle: 'Manage your pending appointments, securely review AI-assisted patient reports, and provide immediate clinical feedback.',
                icon: 'fa-user-md',
                registerUrl: '/',
                registerText: 'Back to Home'
            },
            admin: {
                themeClass: 'theme-admin',
                title: 'System Admin',
                subtitle: 'Monitor system-wide health analytics, manage access control, and securely verify incoming doctor applications.',
                icon: 'fa-shield-alt',
                registerUrl: '/register/admin',
                registerText: 'New Admin'
            }
        };

        function setRole(roleKey) {
            // Update semantic hidden input for main.js to intercept
            document.getElementById('role').value = roleKey;
            
            // Update UI Tab active states
            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.role === roleKey);
            });

            // Update Body Theme
            document.body.className = THEMES[roleKey].themeClass;

            // Update Hero Content Details
            const heroIcon = document.getElementById('heroIcon');
            heroIcon.className = `fas ${THEMES[roleKey].icon} welcome-icon`;
            document.getElementById('heroTitle').innerText = THEMES[roleKey].title;
            document.getElementById('heroSubtitle').innerText = THEMES[roleKey].subtitle;

            // Update Register Link
            const regLink = document.getElementById('registerLink');
            regLink.href = THEMES[roleKey].registerUrl;
            regLink.innerText = THEMES[roleKey].registerText;
        }

        document.addEventListener("DOMContentLoaded", function() {
            const urlParams = new URLSearchParams(window.location.search);
            const initialRole = urlParams.get('role');
            if(initialRole && THEMES[initialRole]) {
                setRole(initialRole);
            }
        });

        function togglePassword() {
            const pwdInput = document.getElementById('password');
            const icon = document.getElementById('togglePasswordIcon');
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                pwdInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
    <script src="/static/js/main.js"></script>
</body>
</html>
