<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Dashboard - MedAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="/">
                <i class="fas fa-heartbeat text-success me-2"></i>MedAI Doctor
            </a>
            <div class="ms-auto d-flex align-items-center">
                <span class="badge bg-success me-3 py-2 px-3 shadow-sm" id="availabilityBadge"><i
                        class="fas fa-circle ms-1 me-1 text-white" style="font-size:8px; vertical-align:middle;"></i>
                    Available</span>
                <span class="text-muted me-3 d-none d-md-block"><i class="fas fa-user-md me-1"></i> Doctor Portal</span>
                <button class="btn btn-outline-danger btn-sm px-3 shadow-sm" onclick="logout()"><i
                        class="fas fa-sign-out-alt me-1"></i> Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="glass-card mb-4 p-3 shadow-sm d-flex justify-content-center">
            <ul class="nav nav-pills" id="doctorTabs" role="tablist">
                <li class="nav-item mx-2" role="presentation">
                    <button class="nav-link active px-4 fw-bold" id="reports-tab" data-bs-toggle="tab"
                        data-bs-target="#reports" type="button"><i class="fas fa-file-medical me-2"></i> Pending
                        Reports</button>
                </li>
                <li class="nav-item mx-2" role="presentation">
                    <button class="nav-link px-4 fw-bold" id="appointments-tab" data-bs-toggle="tab"
                        data-bs-target="#appointments" type="button"><i class="fas fa-calendar-alt me-2"></i>
                        Appointments</button>
                </li>
                <li class="nav-item mx-2" role="presentation">
                    <button class="nav-link px-4 fw-bold" id="availability-tab" data-bs-toggle="tab"
                        data-bs-target="#availability" type="button"><i class="fas fa-user-clock me-2"></i>
                        Status</button>
                </li>
                <li class="nav-item mx-2" role="presentation">
                    <button class="nav-link px-4 fw-bold" id="feedback-tab" data-bs-toggle="tab"
                        data-bs-target="#feedback" type="button"><i class="fas fa-star me-2"></i> Feedback</button>
                </li>
            </ul>
        </div>

        <div class="tab-content">
            <!-- Reports Tab -->
            <div class="tab-pane fade show active fade-in" id="reports">
                <h3 class="mb-4 text-success"><i class="fas fa-clipboard-list me-2"></i> Assigned Patient Reports</h3>
                <div id="reportsList" class="row">
                    <!-- Loaded dynamically -->
                    <div class="text-center w-100 my-5"><i class="fas fa-spinner fa-spin fa-3x text-success"></i></div>
                </div>
            </div>

            <!-- Appointments Tab -->
            <div class="tab-pane fade fade-in" id="appointments">
                <h3 class="mb-4 text-primary"><i class="fas fa-calendar-check me-2"></i> Appointment Requests</h3>
                <div class="glass-card">
                    <div id="appointmentsList" class="list-group list-group-flush">
                        <!-- Loaded dynamically -->
                    </div>
                </div>
            </div>

            <!-- Availability Tab -->
            <div class="tab-pane fade fade-in" id="availability">
                <div class="glass-card text-center py-5">
                    <h3 class="mb-4 text-dark"><i class="fas fa-sliders-h me-2"></i> Manage Availability</h3>
                    <div class="d-flex justify-content-center align-items-center mb-4">
                        <div class="form-check form-switch" style="transform: scale(1.5);">
                            <input class="form-check-input" type="checkbox" id="availabilitySwitch" checked>
                            <label class="form-check-label ms-2" for="availabilitySwitch"
                                style="font-size: 1.2rem;">Available for new patients</label>
                        </div>
                    </div>
                    <button class="btn btn-success px-5 py-2" onclick="updateAvailability()"><i
                            class="fas fa-save me-2"></i> Save Changes</button>
                </div>
            </div>

            <!-- Feedback Tab -->
            <div class="tab-pane fade fade-in" id="feedback">
                <h3 class="mb-4 text-warning"><i class="fas fa-star me-2"></i> Patient Reviews</h3>
                <div class="glass-card mb-4 text-center py-4">
                    <h1 class="fw-bold text-warning" id="avgRating" style="font-size:3rem;">0.0</h1>
                    <div id="avgStars" style="font-size:1.5rem;color:#f59e0b;margin-bottom:8px;"></div>
                    <p class="text-muted mb-0" id="totalReviewsText">0 reviews</p>
                </div>
                <div id="reviewsList"></div>
            </div>
        </div>
    </div>

    <!-- Modal for responding to report -->
    <div class="modal fade" id="responseModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content" style="border-radius:16px; border:none; box-shadow:0 10px 30px rgba(0,0,0,0.1);">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold text-success"><i class="fas fa-stethoscope me-2"></i> Submit
                        Diagnosis</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="currentReportId">
                    <div id="reportDetails" class="bg-light p-3 rounded mb-4"
                        style="border-left: 4px solid var(--secondary);"></div>
                    <label class="form-label text-muted fw-bold">Your Professional Response</label>
                    <textarea class="form-control mb-2" id="doctorResponse" rows="6"
                        placeholder="Write your diagnosis, treatment plan, and advice..."
                        style="box-shadow:none;"></textarea>
                    <small class="text-muted"><i class="fas fa-info-circle me-1"></i> Your professional response will be
                        simplified and translated for the patient by the AI system.</small>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-success px-5" onclick="submitResponse()">Submit
                        Diagnosis</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script src="/static/js/doctor.js"></script>
</body>

</html>
