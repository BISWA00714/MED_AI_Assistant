<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register as Patient - MedAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">
    <!-- Navbar (consistent with index) -->
    <nav class="navbar navbar-expand-lg sticky-top fade-in">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-heartbeat text-primary me-2"></i>MedAI
            </a>
            <div class="ms-auto">
                <a href="/login" class="btn btn-outline-primary shadow-sm"><i class="fas fa-sign-in-alt me-1"></i> Login</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5 fade-in">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                <div class="glass-card p-5">
                    <div class="text-center mb-4">
                        <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
                            <i class="fas fa-user-plus fa-2x"></i>
                        </div>
                        <h2 class="fw-bold text-dark">Join MedAI</h2>
                        <p class="text-muted">Create your patient portal account</p>
                    </div>

                    <form id="registerForm">
                        <div class="mb-3">
                            <label class="form-label text-muted fw-bold">Full Name</label>
                            <input type="text" class="form-control form-control-lg" name="name" placeholder="John Doe" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-muted fw-bold">Age</label>
                                <input type="number" class="form-control form-control-lg" name="age" min="0" max="150" placeholder="e.g. 35" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-muted fw-bold">Gender</label>
                                <select class="form-select form-control-lg" name="gender" required>
                                    <option value="" disabled selected>Select gender</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted fw-bold">Email Address</label>
                            <input type="email" class="form-control form-control-lg" name="email" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted fw-bold">Phone Number</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white"><i class="fas fa-phone text-muted"></i></span>
                                <input type="tel" class="form-control form-control-lg border-start-0" name="phone" placeholder="+1 (555) 000-0000" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted fw-bold">Password</label>
                            <input type="password" class="form-control form-control-lg" name="password" placeholder="Create a secure password" required minlength="6">
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm" style="border-radius:12px;">
                            <i class="fas fa-user-check me-2"></i> Create Account
                        </button>
                    </form>
                    
                    <p class="mt-4 text-center text-muted">Already have an account? <a href="/login" class="text-primary text-decoration-none fw-bold">Sign in here</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/main.js"></script>
</body>
</html>
