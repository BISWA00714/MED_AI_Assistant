<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Result - MedAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="/patient_dashboard.html">MedAI Patient</a>
            <button class="btn btn-outline-danger" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Your Report Result</h2>
        <div id="resultContent" class="card p-4 mt-3">
            <!-- Display result from sessionStorage -->
        </div>
        <a href="/patient_dashboard.html" class="btn btn-primary mt-3">Back to Dashboard</a>
    </div>

    <script>
        const token = localStorage.getItem('access_token');
        if (!token) window.location.href = '/login';

        const result = JSON.parse(sessionStorage.getItem('lastReportResult'));
        if (!result) {
            window.location.href = '/patient_dashboard.html';
        }

        const contentDiv = document.getElementById('resultContent');
        contentDiv.innerHTML = `
            <p><strong>Report ID:</strong> ${result.report_id}</p>
            <p><strong>Severity:</strong> ${result.severity}</p>
            <p><strong>Result:</strong> ${result.result}</p>
        `;

        function logout() {
            localStorage.clear();
            window.location.href = '/login';
        }
    </script>
</body>
</html>
