<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointments - MedAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6; --primary-dark: #1d4ed8; --primary-light: #eff6ff;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --sidebar-bg: #0f172a; --sidebar-text: #94a3b8;
            --bg: #f1f5f9; --card-bg: #ffffff; --text: #1e293b; --muted: #64748b; --border: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        .sidebar {
            width: 260px; min-width: 260px; background: var(--sidebar-bg);
            display: flex; flex-direction: column; overflow-y: auto;
        }
        .sidebar-brand {
            padding: 24px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.07);
            display: flex; align-items: center; gap: 10px;
        }
        .sidebar-brand .logo-icon { width: 36px; height: 36px; background: var(--primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; }
        .sidebar-brand span { color: #fff; font-weight: 700; font-size: 1.1rem; }
        .sidebar-nav { flex: 1; padding: 16px 12px; }
        .nav-item-btn {
            display: flex; align-items: center; gap: 12px; padding: 11px 14px;
            border-radius: 10px; color: var(--sidebar-text); font-size: 0.875rem;
            font-weight: 500; cursor: pointer; border: none; background: none;
            width: 100%; text-align: left; transition: all 0.2s; margin-bottom: 4px; text-decoration: none;
        }
        .nav-item-btn:hover { background: rgba(255,255,255,0.06); color: #fff; }
        .nav-item-btn.active { background: rgba(59,130,246,0.15); color: var(--primary); }
        .nav-item-btn i { width: 18px; text-align: center; }
        .sidebar-footer { padding: 16px 12px; border-top: 1px solid rgba(255,255,255,0.07); }

        .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { padding: 14px 24px; background: var(--card-bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .topbar h1 { font-size: 1.1rem; font-weight: 700; }
        .content-area { flex: 1; overflow-y: auto; padding: 24px; }

        .card-box { background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border); padding: 24px; margin-bottom: 20px; }
        .section-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
        .section-title i { color: var(--primary); }

        /* Doctor Cards */
        .doctor-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
        .doctor-card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; padding: 20px;
            transition: all 0.3s; cursor: pointer; position: relative;
        }
        .doctor-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); border-color: var(--primary); }
        .doctor-card.selected { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
        .doctor-card .doc-header { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
        .doctor-card .doc-avatar { width: 52px; height: 52px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1.2rem; font-weight: 700; }
        .doctor-card .doc-name { font-weight: 700; font-size: 1rem; }
        .doctor-card .doc-spec { font-size: 0.8rem; color: var(--primary); font-weight: 600; }
        .doctor-card .doc-details { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .doctor-card .detail-badge { font-size: 0.75rem; padding: 4px 10px; background: var(--primary-light); color: var(--primary-dark); border-radius: 20px; font-weight: 500; }
        .stars { color: #f59e0b; font-size: 0.85rem; }
        .stars .empty { color: #d1d5db; }
        .rating-text { font-size: 0.75rem; color: var(--muted); margin-left: 6px; }

        /* Appointment list */
        .appt-card { display: flex; align-items: center; justify-content: space-between; padding: 16px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; transition: all 0.2s; }
        .appt-card:hover { background: var(--primary-light); }
        .appt-left { display: flex; align-items: center; gap: 14px; }
        .appt-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
        .appt-icon.requested { background: #fef3c7; color: #d97706; }
        .appt-icon.confirmed { background: #d1fae5; color: #059669; }
        .appt-icon.cancelled { background: #fee2e2; color: #dc2626; }
        .appt-name { font-weight: 600; font-size: 0.9rem; }
        .appt-date { font-size: 0.78rem; color: var(--muted); }
        .appt-actions { display: flex; gap: 8px; align-items: center; }
        .badge-status { font-size: 0.72rem; padding: 4px 12px; border-radius: 20px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge-requested { background: #fef3c7; color: #92400e; }
        .badge-confirmed { background: #d1fae5; color: #065f46; }
        .badge-cancelled { background: #fee2e2; color: #991b1b; }

        .btn-video-call { background: linear-gradient(135deg, #10b981, #059669); color: #fff; border: none; padding: 8px 16px; border-radius: 10px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-video-call:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(16,185,129,0.4); }
        .btn-feedback { background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff; border: none; padding: 8px 16px; border-radius: 10px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-feedback:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(245,158,11,0.4); }

        .btn-book {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff; border: none; padding: 14px 32px; border-radius: 12px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
            box-shadow: 0 4px 14px rgba(59,130,246,0.3);
        }
        .btn-book:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(59,130,246,0.45); }
        .btn-book:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        /* Feedback modal */
        .star-rating { display: flex; gap: 4px; font-size: 1.8rem; cursor: pointer; }
        .star-rating i { color: #d1d5db; transition: all 0.15s; }
        .star-rating i.active, .star-rating i:hover, .star-rating i:hover ~ i { color: #f59e0b; }
        .star-rating:hover i { color: #d1d5db; }
        .star-rating i:hover, .star-rating i:hover ~ i { color: #f59e0b !important; }

        .modal-content { border-radius: 16px; border: none; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-brand">
            <div class="logo-icon"><i class="fas fa-heartbeat"></i></div>
            <div><span>MedAI</span><small style="color:var(--sidebar-text);font-size:0.7rem;">Patient Portal</small></div>
        </div>
        <div class="sidebar-nav">
            <a href="/patient_dashboard.html" class="nav-item-btn"><i class="fas fa-comments"></i> AI Consultation</a>
            <a href="/patient_dashboard.html#history" class="nav-item-btn"><i class="fas fa-history"></i> Medical History</a>
            <a href="/appointment.html" class="nav-item-btn active"><i class="fas fa-calendar-alt"></i> Appointments</a>
            <a href="/find_doctors.html" class="nav-item-btn"><i class="fas fa-user-md"></i> Find Doctors</a>
        </div>
        <div class="sidebar-footer">
            <button class="nav-item-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>

    <!-- Main -->
    <div class="main-area">
        <div class="topbar">
            <h1><i class="fas fa-calendar-check me-2 text-primary"></i>Appointments</h1>
        </div>
        <div class="content-area">

            <!-- My Appointments -->
            <div class="card-box">
                <div class="section-title"><i class="fas fa-list-check"></i> My Appointments</div>
                <div id="appointmentsList"></div>
            </div>

        </div>
    </div>

    <!-- Feedback Modal -->
    <div class="modal fade" id="feedbackModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold"><i class="fas fa-star me-2 text-warning"></i>Rate Your Doctor</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center">
                    <input type="hidden" id="feedbackDoctorId">
                    <input type="hidden" id="feedbackAppointmentId">
                    <p class="text-muted mb-3">How was your consultation with <strong id="feedbackDoctorName">Dr.</strong>?</p>
                    <div class="star-rating mb-3" id="starRating">
                        <i class="fas fa-star" data-val="1"></i>
                        <i class="fas fa-star" data-val="2"></i>
                        <i class="fas fa-star" data-val="3"></i>
                        <i class="fas fa-star" data-val="4"></i>
                        <i class="fas fa-star" data-val="5"></i>
                    </div>
                    <input type="hidden" id="selectedRating" value="0">
                    <textarea class="form-control" id="feedbackComment" rows="3" placeholder="Share your experience (optional)..." style="border-radius:12px;"></textarea>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-warning px-4 text-white fw-bold" onclick="submitFeedback()"><i class="fas fa-paper-plane me-1"></i>Submit</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const token = localStorage.getItem('access_token');
        if (!token) window.location.href = '/login';

        // ── Load Appointments ──
        async function loadAppointments() {
            const res = await fetch('/patient/appointments', { headers: { 'Authorization': `Bearer ${token}` } });
            const apps = await res.json();
            const container = document.getElementById('appointmentsList');
            if (apps.length === 0) {
                container.innerHTML = '<div class="text-center py-4"><i class="fas fa-calendar-xmark fa-3x text-muted mb-3" style="opacity:0.3;"></i><p class="text-muted">No appointments yet. Book your first one below!</p></div>';
                return;
            }
            container.innerHTML = apps.map(a => {
                const roomName = `MedAI-Apt-${a.appointment_id}`;
                return `
                <div class="appt-card">
                    <div class="appt-left">
                        <div class="appt-icon ${a.status}"><i class="fas fa-${a.status === 'confirmed' ? 'check-circle' : a.status === 'cancelled' ? 'times-circle' : 'clock'}"></i></div>
                        <div>
                            <div class="appt-name">Dr. ${a.doctor_name}</div>
                            <div class="appt-date"><i class="far fa-calendar me-1"></i>${new Date(a.date).toLocaleString()}</div>
                        </div>
                    </div>
                    <div class="appt-actions">
                        <span class="badge-status badge-${a.status}">${a.status}</span>
                        ${a.status === 'confirmed' ? `
                            <button class="btn-video-call" onclick="window.open('/video_call?room=${roomName}','_blank')">
                                <i class="fas fa-video me-1"></i>Video Call
                            </button>
                            <button class="btn-video-call" style="background:linear-gradient(135deg,#3b82f6,#1d4ed8);" onclick="window.open('tel:','_self')">
                                <i class="fas fa-phone me-1"></i>Audio Call
                            </button>
                            <button class="btn-feedback" onclick="openFeedback(${a.appointment_id}, '${a.doctor_name}')">
                                <i class="fas fa-star me-1"></i>Feedback
                            </button>
                        ` : ''}
                    </div>
                </div>
            `}).join('');
        }

        // ── Feedback ──
        function openFeedback(appointmentId, doctorName) {
            // Find doctor_id from appointments
            document.getElementById('feedbackAppointmentId').value = appointmentId;
            document.getElementById('feedbackDoctorName').textContent = `Dr. ${doctorName}`;
            document.getElementById('selectedRating').value = 0;
            document.getElementById('feedbackComment').value = '';
            document.querySelectorAll('#starRating i').forEach(s => s.classList.remove('active'));

            // Find doctor_id by name from loaded data
            const doc = doctorsData.find(d => d.name === doctorName);
            document.getElementById('feedbackDoctorId').value = doc ? doc.doctor_id : '';

            new bootstrap.Modal(document.getElementById('feedbackModal')).show();
        }

        // Star click handler
        document.querySelectorAll('#starRating i').forEach(star => {
            star.addEventListener('click', function() {
                const val = parseInt(this.dataset.val);
                document.getElementById('selectedRating').value = val;
                document.querySelectorAll('#starRating i').forEach((s, idx) => {
                    s.classList.toggle('active', idx < val);
                });
            });
        });

        async function submitFeedback() {
            const rating = parseInt(document.getElementById('selectedRating').value);
            const comment = document.getElementById('feedbackComment').value;
            const doctorId = document.getElementById('feedbackDoctorId').value;
            const appointmentId = document.getElementById('feedbackAppointmentId').value;
            if (!rating || rating < 1) { alert('Please select a star rating.'); return; }
            const res = await fetch('/patient/feedback', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ doctor_id: parseInt(doctorId), rating, comment, appointment_id: parseInt(appointmentId) })
            });
            if (res.ok) {
                alert('Thank you for your feedback!');
                bootstrap.Modal.getInstance(document.getElementById('feedbackModal')).hide();
                loadDoctors(); // Refresh ratings
            } else {
                const r = await res.json();
                alert(r.msg || 'Failed to submit feedback.');
            }
        }

        // ── Init ──
        loadAppointments();

        function logout() { localStorage.clear(); window.location.href = '/login'; }
    </script>
</body>
</html>
