<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Medical Report - MedAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="/patient_dashboard.html">MedAI Patient</a>
            <button class="btn btn-outline-danger" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Submit Symptoms</h2>
        <form id="reportForm" enctype="multipart/form-data">
            <div class="mb-3">
                <label>Symptoms Description</label>
                <textarea class="form-control" name="symptoms" rows="5" required></textarea>
            </div>
            <div class="mb-3">
                <label>Upload Image (optional)</label>
                <input type="file" class="form-control" name="image" accept="image/*">
            </div>
            <div class="mb-3">
                <label>Preferred Language</label>
                <select class="form-control" name="language">
                    <option value="English">English</option>
                    <option value="Hindi">Hindi</option>
                    <option value="Telugu">Telugu</option>
                    <option value="Marathi">Marathi</option>
                    <option value="Odia">Odia</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
            <a href="/patient_dashboard.html" class="btn btn-secondary">Back</a>
        </form>
    </div>

    <script>
        const token = localStorage.getItem('access_token');
        if (!token) window.location.href = '/login';

        document.getElementById('reportForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const res = await fetch('/patient/submit_report', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData
            });
            const result = await res.json();
            if (res.ok) {
                // Store result in session storage for result page
                sessionStorage.setItem('lastReportResult', JSON.stringify(result));
                window.location.href = '/report_result.html';
            } else {
                alert(result.msg || 'Submission failed');
            }
        });

        function logout() {
            localStorage.clear();
            window.location.href = '/login';
        }
    </script>
</body>
</html>
