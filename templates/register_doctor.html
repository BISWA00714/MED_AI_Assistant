<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Doctor - MedAI Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">
    <!-- Navbar matching admin dashboard -->
    <nav class="navbar navbar-expand-lg sticky-top fade-in" style="background: rgba(33, 37, 41, 0.9) !important;">
        <div class="container-fluid px-4">
            <a class="navbar-brand text-white" href="/admin_dashboard.html">
                <i class="fas fa-arrow-left me-2"></i> Back to Dashboard
            </a>
            <div class="ms-auto d-flex align-items-center">
                <span class="text-light me-3 d-none d-md-block"><i class="fas fa-user-shield me-1"></i> System Administrator</span>
                <button class="btn btn-outline-light btn-sm px-3 shadow-sm" onclick="logout()"><i class="fas fa-sign-out-alt me-1"></i> Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5 fade-in">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="glass-card p-5">
                    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-4">
                        <div>
                            <h2 class="fw-bold text-dark mb-0"><i class="fas fa-user-md text-primary me-2"></i> Register New Doctor</h2>
                            <p class="text-muted mt-2 mb-0">Add a healthcare professional to the system</p>
                        </div>
                        <div class="bg-light rounded-circle p-3 shadow-sm border">
                            <i class="fas fa-hospital text-muted fa-2x"></i>
                        </div>
                    </div>
                    
                    <form id="doctorForm">
                        <div class="row g-4">
                            <div class="col-md-6 col-lg-8">
                                <label class="form-label text-muted fw-bold">Full Name</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="fas fa-user-md text-muted"></i></span>
                                    <input type="text" class="form-control form-control-lg border-start-0" name="name" placeholder="Dr. Jane Smith" required>
                                </div>
                            </div>
                            <div class="col-md-6 col-lg-4">
                                <label class="form-label text-muted fw-bold">Age</label>
                                <input type="number" class="form-control form-control-lg" name="age" min="20" max="90" placeholder="e.g. 45" required>
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label text-muted fw-bold">Gender</label>
                                <select class="form-select form-control-lg" name="gender" required>
                                    <option value="" disabled selected>Select gender</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted fw-bold">Education Qualification</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="fas fa-graduation-cap text-muted"></i></span>
                                    <input type="text" class="form-control form-control-lg border-start-0" name="education" placeholder="e.g. MBBS, MD" required>
                                </div>
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label text-muted fw-bold">Years of Experience</label>
                                <input type="number" class="form-control form-control-lg" name="experience_years" min="0" placeholder="e.g. 10" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted fw-bold">Medical Specialization</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="fas fa-stethoscope text-muted"></i></span>
                                    <select class="form-select form-control-lg border-start-0" name="specialization" required>
                                        <option value="" disabled selected>Select department</option>
                                        <option value="Cardiologist">Cardiologist (Heart)</option>
                                        <option value="Neurologist">Neurologist (Brain & Nerves)</option>
                                        <option value="Dermatologist">Dermatologist (Skin)</option>
                                        <option value="Orthopedic">Orthopedic (Bones & Joints)</option>
                                        <option value="General Physician">General Physician (Primary Care)</option>
                                        <option value="Pediatrician">Pediatrician (Children)</option>
                                        <option value="ENT Specialist">ENT Specialist (Ear, Nose, Throat)</option>
                                    </select>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label text-muted fw-bold">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="fas fa-envelope text-muted"></i></span>
                                    <input type="email" class="form-control form-control-lg border-start-0" name="email" placeholder="doctor@hospital.com" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted fw-bold">Contact Number</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="fas fa-phone text-muted"></i></span>
                                    <input type="tel" class="form-control form-control-lg border-start-0" name="phone" placeholder="+1 (555) 000-0000" required>
                                </div>
                            </div>

                            <div class="col-12 border-top pt-4">
                                <label class="form-label text-muted fw-bold">Temporary Account Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="fas fa-key text-muted"></i></span>
                                    <input type="password" class="form-control form-control-lg border-start-0" name="password" placeholder="Create a temporary password" required>
                                </div>
                                <small class="text-muted"><i class="fas fa-info-circle me-1"></i> Give this password to the doctor so they can log in.</small>
                            </div>
                            
                            <div class="col-12 mt-4 d-flex justify-content-end align-items-center">
                                <a href="/admin_dashboard.html" class="btn btn-light px-4 me-3">Cancel</a>
                                <button type="submit" class="btn btn-success btn-lg px-5 shadow-sm"><i class="fas fa-plus-circle me-2"></i> Register Doctor</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/main.js"></script>
</body>
</html>
