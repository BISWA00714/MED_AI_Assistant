<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedAI - Admin Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            min-height: 100vh;
        }

        .admin-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: #f8fafc;
            padding: 3rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .form-control-lg,
        .form-select-lg {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .form-control-lg:focus,
        .form-select-lg:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #8b5cf6;
            color: #fff;
            box-shadow: 0 0 0 0.25rem rgba(139, 92, 246, 0.25);
        }

        .input-group-text {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #cbd5e1;
        }

        .form-label {
            color: #e2e8f0 !important;
        }

        .btn-brand {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            color: white;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-brand:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.4);
            color: white;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg sticky-top fade-in border-bottom border-secondary">
        <div class="container">
            <a class="navbar-brand text-white" href="/">
                <i class="fas fa-heartbeat text-info me-2"></i>MedAI <span class="badge bg-secondary ms-2"
                    style="font-size:0.6rem;">ADMIN</span>
            </a>
            <div class="ms-auto">
                <a href="/login?role=admin" class="btn btn-outline-light shadow-sm"><i
                        class="fas fa-sign-in-alt me-1"></i> Admin Login</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5 fade-in">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                <div class="admin-card">
                    <div class="text-center mb-4">
                        <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
                            style="width: 60px; height: 60px; background: linear-gradient(135deg, #8b5cf6, #6d28d9) !important;">
                            <i class="fas fa-user-shield fa-2x"></i>
                        </div>
                        <h2 class="fw-bold">Create Admin Account</h2>
                        <p class="text-secondary">Register a new system administrator</p>
                    </div>

                    <form id="adminRegisterForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Full Name</label>
                            <input type="text" class="form-control form-control-lg" name="name"
                                placeholder="E.g., Sarah Jenkins" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Gender</label>
                            <select class="form-select form-select-lg" name="gender" required>
                                <option value="" disabled selected style="color:#000;">Select gender</option>
                                <option value="Male" style="color:#000;">Male</option>
                                <option value="Female" style="color:#000;">Female</option>
                                <option value="Other" style="color:#000;">Other</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Email Address</label>
                            <input type="email" class="form-control form-control-lg" name="email"
                                placeholder="admin@medai.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Phone Number</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-phone"></i></span>
                                <input type="tel" class="form-control form-control-lg border-start-0" name="phone"
                                    placeholder="+1 (555) 000-0000" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Master Password</label>
                            <input type="password" class="form-control form-control-lg" name="password"
                                placeholder="Create a high-security password" required minlength="8">
                        </div>

                        <button type="submit" class="btn btn-brand btn-lg w-100 shadow-sm" style="border-radius:12px;">
                            <i class="fas fa-shield-alt me-2"></i> Register Administrator
                        </button>
                    </form>

                    <p class="mt-4 text-center text-secondary">Return to <a href="/login?role=admin"
                            class="text-info text-decoration-none fw-bold">Admin Login</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('adminRegisterForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Registering...';
            btn.disabled = true;

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            try {
                const res = await fetch('/auth/register/admin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (res.ok) {
                    alert('Admin registered successfully! Redirecting to login...');
                    window.location.href = '/login?role=admin';
                } else {
                    alert(result.msg || 'Registration failed');
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch (error) {
                alert('An error occurred during registration.');
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
