<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Consultation - MedAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #fff; height: 100vh; display: flex; flex-direction: column; }
        .video-header {
            padding: 12px 24px; background: rgba(15,23,42,0.95); border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: space-between; z-index: 10;
        }
        .video-header .brand { display: flex; align-items: center; gap: 10px; }
        .video-header .brand .icon { width: 36px; height: 36px; background: #3b82f6; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .video-header .brand span { font-weight: 700; font-size: 1.1rem; }
        .video-header .room-name { color: #94a3b8; font-size: 0.85rem; }
        .btn-leave { background: #ef4444; color: #fff; border: none; padding: 10px 24px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-leave:hover { background: #dc2626; transform: translateY(-1px); }
        .video-container { flex: 1; position: relative; }
        .video-container iframe { width: 100%; height: 100%; border: none; }
        .no-room { display: flex; align-items: center; justify-content: center; height: 100%; flex-direction: column; gap: 16px; }
        .no-room h2 { font-size: 1.5rem; }
        .no-room p { color: #94a3b8; }
    </style>
</head>
<body>
    <div class="video-header">
        <div class="brand">
            <div class="icon">🩺</div>
            <div>
                <span>MedAI Video Consultation</span>
                <div class="room-name" id="roomDisplay">Connecting...</div>
            </div>
        </div>
        <button class="btn-leave" onclick="leaveCall()">✕ Leave Call</button>
    </div>

    <div class="video-container" id="videoContainer">
        <div class="no-room" id="noRoomMsg" style="display:none;">
            <h2>No Room Specified</h2>
            <p>Please access this page through your appointment or triage result.</p>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const room = params.get('room');

        if (room) {
            document.getElementById('roomDisplay').textContent = 'Room: ' + room;
            const container = document.getElementById('videoContainer');
            const iframe = document.createElement('iframe');
            iframe.src = `https://meet.jit.si/${encodeURIComponent(room)}#config.prejoinPageEnabled=false&config.startWithAudioMuted=false&config.startWithVideoMuted=false`;
            iframe.allow = 'camera; microphone; fullscreen; display-capture; autoplay; clipboard-write';
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.style.border = 'none';
            container.appendChild(iframe);
        } else {
            document.getElementById('noRoomMsg').style.display = 'flex';
        }

        function leaveCall() {
            if (confirm('Are you sure you want to leave the call?')) {
                window.close();
                // Fallback if window.close() doesn't work
                window.location.href = '/patient_dashboard.html';
            }
        }
    </script>
</body>
</html>
